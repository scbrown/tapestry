config:
  MD013: false          # No line length limit
  MD025: false          # Multiple top-level headings allowed
  MD033: false          # Inline HTML allowed
  MD024: { siblings_only: true }  # Duplicate headings allowed if not siblings
  MD026: false          # Trailing punctuation in headings allowed
  MD036: false          # Emphasis used instead of heading allowed
  MD041: false          # First line heading not required
  MD040: true           # Fenced code blocks must specify language
  MD004: { style: "dash" }  # List marker style: dash
  MD060: false

globs:
  - "docs/book/src/**/*.md"
  - "README.md"
  - "CONTRIBUTING.md"
