{{define "layout"}}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{template "title" .}} — Tapestry</title>
    <link rel="stylesheet" href="/static/style.css">
    <script src="https://unpkg.com/htmx.org@2.0.4"></script>
</head>
<body>
    <header>
        <nav hx-boost="true" hx-target="#content" hx-swap="innerHTML" hx-push-url="true">
            <a href="/" class="logo">Tapestry</a>
            <span class="tagline">archivist dashboard</span>
            <a href="/executive">exec</a>
            <a href="/command-center">cmd</a>
            <a href="/work">work</a>
            <a href="/status">status</a>
            <a href="/briefing">briefing</a>
            <a href="/agents">agents</a>
            <a href="/decisions">decisions</a>
            <a href="/achievements">achievements</a>
            <a href="/homelab">homelab</a>
            <a href="/theme-parks">parks</a>
            <a href="/designs">designs</a>
            <a href="/epics">epics</a>
            <a href="/handoffs">handoffs</a>
            <a href="/velocity">velocity</a>
            <a href="/commits">commits</a>
            <a href="/labels">labels</a>
            <a href="/blocked">blocked</a>
            <a href="/beads">beads</a>
            <form action="/search" method="get" class="nav-search"><input type="text" name="q" placeholder="search beads..." class="nav-search-input" hx-get="/search" hx-trigger="keyup changed delay:300ms, search" hx-target="#content" hx-push-url="true" hx-indicator=".nav-search-indicator"><span class="nav-search-indicator htmx-indicator">...</span></form>
        </nav>
    </header>
    <main id="content">
        {{template "content" .}}
    </main>
</body>
</html>
{{end}}
